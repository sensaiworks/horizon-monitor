[mcp]
server_path = "C:\\path\\to\\horizon-mcp\\dist\\index.js"  # absolute path to compiled MCP server
command     = "node"

[polling]
interval_seconds  = 3
change_threshold  = 10        # imagehash Hamming distance (0=identical, 64=max)
screen_index      = 0         # 0=primary, 1=secondary — use secondary if Horizon is on monitor 2
focus_before_shot = false     # true only if Horizon won't render unless active (rare)

[windows]
monitor_titles = ["PVDI", "horizon-client"]  # partial window title matches (case-insensitive)

[capture]
# Auto-start monitoring + collecting when the app launches. When rotate=true (and
# [control].enabled), the monitor also cycles through the apps in [[capture.targets]]:
# it brings each to the front by CLICKING its taskbar button (found by OCR-matching the
# label, re-read each cycle so button drift doesn't matter), screenshots the whole VDI,
# and captures it (per-app change detection). With rotate=false it just runs the
# read-only passive monitor (no focus-stealing, no typing, no unlock).
auto_start          = true
# Keep rotate=false until you've calibrated the taskbar match terms below (test one with
# `python main.py remote taskbar Symphony`). Then flip to true.
rotate              = false
settle_seconds      = 1.2   # wait after switching to an app before the screenshot
cycle_seconds       = 8     # pause between full rotations
# Rotation steals local focus, so it yields to you: the instant you touch the mouse or
# keyboard it pauses, and resumes only after you've been idle this long.
idle_resume_seconds = 90
auto_unlock         = true  # if the session is locked, unlock it (needs HORIZON_PASSWORD)
unlock_cooldown_seconds = 120  # never re-submit the password more often than this

# Apps to rotate through. `match` = substrings to look for in the taskbar button label
# (case-insensitive, first match wins). Tune these to whatever YOUR taskbar shows — e.g.
# Teams' button is often truncated to the active chat title, so match on a stable part.
# Apps not currently on the taskbar are skipped. (Scalars above MUST stay above these
# array-of-tables — TOML assigns bare keys to the last table header.)
[[capture.targets]]
name  = "Teams"
# NB: Windows OCR reads the pipe "|" as "I", so don't put "|" in match terms — the Teams
# button "Chat | PSA Azure …" OCRs as "Chat I PSA Azure …". Match the plain words instead.
match = ["Microsoft Teams", "Teams", "Chat"]

[[capture.targets]]
name  = "Outlook"
match = ["Outlook"]

[[capture.targets]]
name  = "Symphony"
match = ["Symphony"]

[webcam]
# Privacy watch: alert + log when the Horizon client opens your LOCAL webcam (i.e. the
# VDI / Teams / Webex using your camera via Real-Time Audio-Video redirection). Reads
# Windows' per-app camera-usage registry — READ-ONLY, never changes camera state.
# `match` = substrings of the using app's path; the VMware Horizon camera process is
# horizon-protocol.exe, so "horizon" catches it. Toggle/log live on the Monitor tab.
match            = ["horizon"]
interval_seconds = 5

[claude]
vision_model = "claude-haiku-4-5-20251001"
query_model  = "claude-sonnet-4-6"
max_tokens   = 1024

[rag]
db_path            = "./data/chromadb"
events_db          = "./data/events.db"   # SQLite structured store (exact/temporal queries)
collection_name    = "horizon_events"
embedding_provider = "voyage"   # "voyage" or "local"
top_k              = 8

[notifications]
enabled          = true
mention_keywords = []           # extra keywords that count as directed at user
cooldown_minutes = 5            # deduplicate window

[user]
display_name = "YourName"       # used in prompts to detect self-mentions

[retention]
# How long to keep captured conversation data. On `monitor` startup, events older
# than this are deleted from both SQLite and ChromaDB. 0 = keep everything forever.
# You can also trim/wipe manually any time: `python main.py purge [--older-than N]`.
retain_days = 0

[control]
# Master switch for WRITE actions into the remote desktop (unlock, launch/activate
# apps, send replies). These type/click into a corporate session and steal local
# focus, so they are off by default and only ever run when YOU trigger them.
enabled            = false
focus_target       = "PVDI"     # local Horizon window to focus before sending input
screen             = 0          # which monitor the remote surface is on (list_monitors index)
launch_wait_seconds = 1.5       # pause after Start-search / Enter for the remote to react
# keep-alive: `remote keep-alive` nudges the cursor 1px this often so the session never
# idles into a lock. Keep it well under the VDI's lock timeout. Steals local focus each
# tick (input needs the Horizon window foreground) — use it when you've stepped away.
keepalive_interval_seconds = 120
# Code-editing bridge (read-file/write-file): pull a file out of the remote editor,
# edit it locally, paste the whole document back. Relies on Horizon clipboard
# redirection being enabled (it usually is); read-file reports clearly if it isn't.
clipboard_sync_seconds = 0.6    # time for the clipboard to sync local <-> remote
copy_timeout_seconds   = 6.0    # give up waiting for a copied file to arrive after this
# HORIZON_PASSWORD (in .env) is used only by the unlock action.

[assist]
# Direct-help agent (Assist tab / `python main.py assist`): a screen-aware computer-use
# loop that drives the remote VDI to accomplish a goal you describe in plain language.
# ADVISE mode is read-only — it only suggests the steps. ACT mode performs them, but
# confirms every single input action (click / type / key / scroll) before it runs.
model         = "claude-opus-4-8"  # vision + reasoning model for the agent loop
# (the VDI monitor is now auto-detected from the Horizon window rect — Assist captures the
#  WHOLE VDI, even when it spans two monitors, and works in absolute coords. `screen` unused.)
max_steps     = 20                 # max actions per turn — guards against runaways
max_long_edge = 1568               # downscale screenshots to this long edge for the API
effort        = "high"             # reasoning effort ("high" is best for computer use)
focus_target  = "PVDI"             # local Horizon window to focus before sending input
