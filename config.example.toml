[mcp]
server_path = "C:\\path\\to\\horizon-mcp\\dist\\index.js"  # absolute path to compiled MCP server
command     = "node"

[polling]
interval_seconds  = 3
change_threshold  = 10        # imagehash Hamming distance (0=identical, 64=max)
screen_index      = 0         # 0=primary, 1=secondary — use secondary if Horizon is on monitor 2
focus_before_shot = false     # true only if Horizon won't render unless active (rare)

[windows]
monitor_titles = ["PVDI", "horizon-client"]  # partial window title matches (case-insensitive)

[claude]
vision_model = "claude-haiku-4-5-20251001"
query_model  = "claude-sonnet-4-6"
max_tokens   = 1024

[rag]
db_path            = "./data/chromadb"
events_db          = "./data/events.db"   # SQLite structured store (exact/temporal queries)
collection_name    = "horizon_events"
embedding_provider = "voyage"   # "voyage" or "local"
top_k              = 8

[notifications]
enabled          = true
mention_keywords = []           # extra keywords that count as directed at user
cooldown_minutes = 5            # deduplicate window

[user]
display_name = "YourName"       # used in prompts to detect self-mentions

[retention]
# How long to keep captured conversation data. On `monitor` startup, events older
# than this are deleted from both SQLite and ChromaDB. 0 = keep everything forever.
# You can also trim/wipe manually any time: `python main.py purge [--older-than N]`.
retain_days = 0

[control]
# Master switch for WRITE actions into the remote desktop (unlock, launch/activate
# apps, send replies). These type/click into a corporate session and steal local
# focus, so they are off by default and only ever run when YOU trigger them.
enabled            = false
focus_target       = "PVDI"     # local Horizon window to focus before sending input
launch_wait_seconds = 1.5       # pause after Start-search / Enter for the remote to react
# Code-editing bridge (read-file/write-file): pull a file out of the remote editor,
# edit it locally, paste the whole document back. Relies on Horizon clipboard
# redirection being enabled (it usually is); read-file reports clearly if it isn't.
clipboard_sync_seconds = 0.6    # time for the clipboard to sync local <-> remote
copy_timeout_seconds   = 6.0    # give up waiting for a copied file to arrive after this
# HORIZON_PASSWORD (in .env) is used only by the unlock action.
